name: Update V2RaySE Nodes

on:
  schedule:
    - cron: '30 * * * *' # 每小时的第30分钟执行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install axios

      - name: Run Scraper
        run: node v2rayse.js

      - name: Convert to Clash YAML
        run: |
          # 下载并启动 subconverter 转换工具
          wget -O subconverter.tar.gz https://github.com/tindy2013/subconverter/releases/download/v0.7.2/subconverter_linux64.tar.gz
          tar -zxvf subconverter.tar.gz
          chmod +x ./subconverter/subconverter
          nohup ./subconverter/subconverter > /dev/null 2>&1 &
          sleep 3
          
          # 调用本地 subconverter 接口生成 v2rayse.yml
          # 假设 v2rayse_raw.txt 是 base64 格式
          curl -o v2rayse.yml "http://127.0.0.1:25500/sub?target=clash&url=$(pwd)/v2rayse_raw.txt&insert=false"

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add v2rayse.yml
          git commit -m "Auto Update V2RaySE Nodes $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
