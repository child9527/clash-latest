name: 自动更新 v2rayse 订阅文件

on:
  schedule:
    - cron: "0 */6 * * *"   # 每 6 小时自动运行一次
  workflow_dispatch:        # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 第一步：拉取仓库内容
        uses: actions/checkout@v3

      - name: 📥 第二步：下载最新 Gist 内容
        run: |
          echo "正在从源 Gist 下载最新内容……"
          curl -L "https://gist.githubusercontent.com/guidongone/430a387bc61c9e700ff197edc746d8a6/raw" -o latest_gist.yml
          echo "下载完成：latest_gist.yml"

      - name: 🔍 第三步：判断仓库是否已有 v2rayse.yml
        run: |
          if [ -f "v2rayse.yml" ]; then
            echo "检测到仓库已有 v2rayse.yml，进入对比模式……"
            echo "has_file=true" >> $GITHUB_ENV
          else
            echo "仓库中不存在 v2rayse.yml，将直接创建新文件……"
            echo "has_file=false" >> $GITHUB_ENV
          fi

      - name: 🔄 第四步：对比文件内容（如果存在）
        if: env.has_file == 'true'
        run: |
          echo "正在对比仓库文件与最新源文件……"
          if cmp -s "latest_gist.yml" "v2rayse.yml"; then
            echo "内容一致，无需更新。"
            echo "need_update=false" >> $GITHUB_ENV
          else
            echo "检测到内容变化，需要更新！"
            echo "need_update=true" >> $GITHUB_ENV
          fi

      - name: 📝 第五步：写入新内容（首次创建）
        if: env.has_file == 'false'
        run: |
          echo "正在写入新的 v2rayse.yml……"
          mv latest_gist.yml v2rayse.yml
          echo "need_update=true" >> $GITHUB_ENV

      - name: 💾 第六步：覆盖旧文件（内容变化时）
        if: env.need_update == 'true' && env.has_file == 'true'
        run: |
          echo "正在更新 v2rayse.yml……"
          mv latest_gist.yml v2rayse.yml

      - name: 🚀 第七步：提交并推送更新
        if: env.need_update == 'true'
        run: |
          echo "正在提交更新到仓库……"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add v2rayse.yml
          git commit -m "自动更新 v2rayse 订阅文件" || echo "没有可提交的内容"
          git push
          echo "推送完成！"

      - name: 🎉 完成
        run: |
          echo "任务执行完毕。"
