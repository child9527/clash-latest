name: Update V2RaySE Nodes

on:
  schedule:
    - cron: '30 * * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install axios

      - name: Run Scraper
        # 在根目录运行，但指向 scripts 文件夹内的脚本
        # 这样生成的 v2rayse_raw.txt 会直接落在根目录
        run: node scripts/v2rayse.js

      - name: Convert to Clash YAML
        run: |
          wget -O subconverter.tar.gz https://github.com/tindy2013/subconverter/releases/download/v0.7.2/subconverter_linux64.tar.gz
          tar -zxvf subconverter.tar.gz
          chmod +x ./subconverter/subconverter
          nohup ./subconverter/subconverter > /dev/null 2>&1 &
          sleep 3
          
          # 注意：此时 v2rayse_raw.txt 在根目录 $(pwd)
          # 输出目标 v2rayse.yml 也在根目录
          curl -o v2rayse.yml "http://127.0.0.1:25500/sub?target=clash&url=$(pwd)/v2rayse_raw.txt&insert=false"

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          # 确保添加根目录下的 v2rayse.yml
          git add v2rayse.yml
          git commit -m "Auto Update V2RaySE Nodes $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
