name: 更新 V2Ray 订阅

on:
  schedule:
    - cron: "0 * * * *"   # 每小时执行一次
  workflow_dispatch:       # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v3

      - name: 抓取并合并订阅
        run: |
          BASE="https://github.com/free-nodes/v2rayfree/raw/refs/heads/main"
          TODAY=$(date +'%Y%m%d')
          YESTERDAY=$(date -d "yesterday" +'%Y%m%d')
          FILE_TODAY="v2ray$(date +'%m%d')"
          FILE_YESTERDAY="v2ray$(date -d "yesterday" +'%m%d')"

          echo "📂 开始抓取订阅..."

          # 抓取今天的两个订阅
          curl -s "$BASE/v${TODAY}1" -o sub1_today || true
          curl -s "$BASE/v${TODAY}2" -o sub2_today || true
          cat sub1_today sub2_today > "$FILE_TODAY"

          # 判断今天文件是否有效（长度太短视为未更新）
          if [ $(wc -c <"$FILE_TODAY") -lt 50 ]; then
            echo "⚠️ 今天的订阅可能未更新，改为抓取昨天的"
            curl -s "$BASE/v${YESTERDAY}1" -o sub1_yesterday || true
            curl -s "$BASE/v${YESTERDAY}2" -o sub2_yesterday || true
            cat sub1_yesterday sub2_yesterday > "$FILE_YESTERDAY"

            cp "$FILE_YESTERDAY" v2ray-latest
            rm -f "$FILE_TODAY"
            echo "✅ 已更新到昨天的订阅"
          else
            cp "$FILE_TODAY" v2ray-latest
            echo "✅ 已生成今天的订阅文件 $FILE_TODAY"
          fi

      - name: 清理旧文件，只保留最近五天
        run: |
          FILES=$(ls v2ray[0-9][0-9][0-9][0-9] 2>/dev/null | sort)
          COUNT=$(echo "$FILES" | wc -l)
          if [ $COUNT -gt 5 ]; then
            REMOVE=$(echo "$FILES" | head -n $(($COUNT-5)))
            echo "🗑️ 删除过期文件: $REMOVE"
            rm -f $REMOVE
          else
            echo "📢 文件数量不超过五天，无需清理"
          fi

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add v2ray*
            git commit -m "更新 V2Ray 订阅文件"
            git push
            echo "✅ 已提交更新到仓库"
          else
            echo "📢 没有变化，无需提交"
